<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="auth-page-wrapper">
        <div class="auth-form-container">
            <h1>Welcome Back!</h1>
            
            <!-- Email address input field - used to identify user account -->
            <input 
                type="email" 
                id="login-email" 
                placeholder="Email Address" 
                required
            >
            
            <!-- Password input field - validated against stored credentials -->
            <input 
                type="password" 
                id="login-password" 
                placeholder="Password" 
                required
            >      

            <!-- Submit button to authenticate user -->
            <button id="login-submit-btn" type="submit">Login</button>
        </div>  
    </div>
</body>
</html>
